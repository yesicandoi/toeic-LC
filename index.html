<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- 캐시 완전 차단 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>English Daily</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A2A66">
</head>

<body>

  <!-- ===========================
       메인 화면
  =========================== -->
  <div id="main-screen">

    <h1>30일 습관 만들기 프로젝트</h1>

    <div style="text-align:center; margin-bottom:20px;">
      <button onclick="openBookmarks()">📌 북마크</button>
      <button onclick="openLCWrongs()">🎧 LC 오답노트</button>
    </div>

    <div id="day-buttons"></div>

    <div style="margin-top:40px; text-align:center; font-size:14px; line-height:1.8; color:#444;">
      <p><strong>하루-이틀 못해도 괜찮으니까, 끝까지만 합시다. 틀리는 걸 두려워하지 맙시다.</strong></p>
      <p><strong>준비물 - 공책, ETS 음원 어플</strong></p>

      <p>0. 오늘 영작할 문제 LC 풀어보고, 공책에 정답 적어두기.</p>
      <p>1. (한문제 끝날때 마다) 모르는 단어 있어도 한글로 적어서 영작하기.</p>
      <p>2. 정답문장 바로 아래칸에 색깔펜으로 적기.</p>
      <p>3. 눈감고 말하기 → LC 매칭 → 1.2배속 다시 듣기</p>
      <p>4. 모르는 단어 정리</p>
    </div>

  </div>


  <!-- ===========================
       학습 화면
  =========================== -->
  <div id="study-screen" class="hidden">

    <button onclick="goHome()">← 메인으로</button>

    <h2 id="day-title"></h2>

    <div id="content"></div>

  </div>


  <!-- ===========================
       JS 로드
  =========================== -->

  <!-- 🔥 app.js -->
  <script src="app.js?v=1.0.0"></script>

  <!-- 🔥 Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {

        reg.onupdatefound = () => {
          const newWorker = reg.installing;

          newWorker.onstatechange = () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // 새 버전 감지 → 강제 새로고침
              window.location.reload();
            }
          };
        };

      }).catch(err => {
        console.log("SW 등록 실패:", err);
      });
    }
  </script>

</body>
</html>
