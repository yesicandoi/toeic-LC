<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8">
  <title>English Daily</title>
  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A2A66">
</head>
<body>

  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.onupdatefound = () => {
        const newWorker = reg.installing;
        newWorker.onstatechange = () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // 🔥 새 버전 감지 → 강제 새로고침
            window.location.reload();
          }
        };
      };
    });
  }
</script>

<div id="main-screen">
  <h1>25일 영어 학습 4권</h1>

  <!-- 📌 북마크 -->
  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="openBookmarks()">📌 북마크</button>
  </div>

  <!-- Day 버튼 -->
  <div id="day-buttons"></div>

  <!-- 설명 -->
  <div style="margin-top:40px; text-align:center; font-size:14px; line-height:1.8; color:#444;">
    <p><strong> 꾸준하게만 합시다. 틀리는 걸 두려워하지 맙시다. </strong></p>
    <p><strong> 준비물 - 공책, ETS 음원 어플 </strong></p>
    <p>0. 10문제 LC 풀어보고, 공책에 정답 적어두기. </p>
    <p>1. 모르는 단어있어도 한글로 적어서 영작하기. </p>
    <p>2. 정답문장 바로 아래칸에 색깔펜으로 적기. + 오른쪽에 몰랐던 단어 적기. (1문제씩 바로바로) </p>
    <p>3. 눈감고, 방금 쓴 문장 의미만을 상상하며 직접 입으로 얘기하기. 입에 안붙으면 북마크해놓기. 그렇게 LC매칭 후에 1.2배속으로 음원 다시 들어보기. </p>
    <p>4. 모르는 단어 적어둔거 정리 </p>
  </div>
</div>
